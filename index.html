<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الروتين الذكي 🚀</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="setupPage" class="hidden">
            <h2>إعداد روتين الأسبوع 📋</h2>
            <div id="daysSetupContainer"></div>
            <button onclick="saveWeeklyRoutine()" class="save-btn">حفظ الروتين وبدء اليوم ✅</button>
        </div>

        <div id="mainPage">
            <h1 id="dayTitle">...</h1>
            <div class="progress-container"><div id="progressBar"></div></div>
            <p id="levelStatus">بانتظار المهام...</p>
            <ul id="taskList"></ul>
            <button onclick="showSetup()" class="edit-btn">تعديل مهام الأسبوع ⚙️</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
