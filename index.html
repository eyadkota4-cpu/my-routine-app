<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>روتين إياد</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>
    <div class="app-wrapper">
        <div id="setupPage" class="hidden">
            <header>
                <h2>إعداد الروتين 📋</h2>
            </header>
            <div id="daysSetupContainer"></div>
            <div class="sticky-footer">
                <button onclick="saveWeeklyRoutine()" class="save-btn">حفظ الأسبوع ✅</button>
            </div>
        </div>

        <div id="mainPage">
            <header>
                <h1 id="dayTitle">...</h1>
                <div class="progress-info">
                    <p id="levelStatus">بانتظار المهام...</p>
                    <div class="progress-container"><div id="progressBar"></div></div>
                </div>
            </header>
            
            <main>
                <ul id="taskList"></ul>
            </main>

            <div class="sticky-footer">
                <button onclick="showSetup()" class="edit-btn">⚙️ تعديل المهام</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
